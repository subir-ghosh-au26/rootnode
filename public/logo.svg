<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#1e1b4b" rx="64"/>
  <!-- Concentric Rings -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="white" stroke-width="2" opacity="0.05"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="white" stroke-width="2" opacity="0.1"/>
  <circle cx="256" cy="256" r="90" fill="none" stroke="white" stroke-width="2" opacity="0.15"/>

  <!-- Radial Lines -->
  <line x1="256" y1="256" x2="256" y2="46" stroke="white" stroke-width="4" opacity="0.15"/>
  <line x1="256" y1="256" x2="256" y2="466" stroke="white" stroke-width="4" opacity="0.15"/>
  <line x1="256" y1="256" x2="46" y2="256" stroke="white" stroke-width="4" opacity="0.15"/>
  <line x1="256" y1="256" x2="466" y2="256" stroke="white" stroke-width="4" opacity="0.15"/>
  
  <line x1="256" y1="256" x2="107.5" y2="107.5" stroke="white" stroke-width="4" opacity="0.15"/>
  <line x1="256" y1="256" x2="404.5" y2="107.5" stroke="white" stroke-width="4" opacity="0.15"/>
  <line x1="256" y1="256" x2="107.5" y2="404.5" stroke="white" stroke-width="4" opacity="0.15"/>
  <line x1="256" y1="256" x2="404.5" y2="404.5" stroke="white" stroke-width="4" opacity="0.15"/>

  <!-- Nodes -->
  <circle cx="256" cy="46" r="22" fill="#a5b4fc"/>
  <circle cx="256" cy="466" r="22" fill="#a5b4fc"/>
  <circle cx="46" cy="256" r="22" fill="#a5b4fc"/>
  <circle cx="466" cy="256" r="22" fill="#a5b4fc"/>
  
  <circle cx="107.5" cy="107.5" r="22" fill="#a5b4fc"/>
  <circle cx="404.5" cy="107.5" r="22" fill="#a5b4fc"/>
  <circle cx="107.5" cy="404.5" r="22" fill="#a5b4fc"/>
  <circle cx="404.5" cy="404.5" r="22" fill="#a5b4fc"/>

  <!-- Core Hub -->
  <circle cx="256" cy="256" r="75" fill="#4f46e5"/>
  <circle cx="256" cy="256" r="30" fill="#e0e7ff"/>

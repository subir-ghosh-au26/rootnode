<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background Circle (Indigo) -->
  <circle cx="256" cy="256" r="240" fill="#1e1b4b"/>
  
  <!-- Outer Orbit (Faint Brand Color) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#4f46e5" stroke-width="4" opacity="0.4"/>
  
  <!-- Inner Orbit (Mid Blue) -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="#6366f1" stroke-width="6"/>
  
  <!-- Core Circle (Brand Color) -->
  <circle cx="256" cy="256" r="60" fill="#4f46e5"/>
  
  <!-- Technological Core / Center Point -->
  <circle cx="256" cy="256" r="24" fill="white"/>
  
  <!-- Floating Technology Nodes (Orbiting Points) -->
  <!-- Top/Bottom/Left/Right -->
  <circle cx="256" cy="96" r="24" fill="#a5b4fc"/>
  <circle cx="256" cy="416" r="24" fill="#a5b4fc"/>
  <circle cx="96" cy="256" r="24" fill="#a5b4fc"/>
  <circle cx="416" cy="256" r="24" fill="#a5b4fc"/>
  
  <!-- 45-Degree Nodes -->
  <circle cx="142.8" cy="142.8" r="18" fill="#6366f1"/>
  <circle cx="369.2" cy="142.8" r="18" fill="#6366f1"/>
  <circle cx="142.8" cy="369.2" r="18" fill="#6366f1"/>
  <circle cx="369.2" cy="369.2" r="18" fill="#6366f1"/>
</svg>
